<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collarwork Design Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <header class="hero">
        <h1>Welcome to Collarwork Design Studio</h1>
        <p>Your one-stop solution for design needs.</p>
    </header>

    <section class="portfolio">
        <h2>Our Portfolio</h2>
        <div class="portfolio-items">
            <div class="item">Project 1</div>
            <div class="item">Project 2</div>
        </div>
    </section>

    <section class="services">
        <h2>Services</h2>
        <ul>
            <li>Web Design</li>
            <li>Graphic Design</li>
        </ul>
    </section>

    <section class="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Collarwork Design Studio</p>
        <div class="social">
            <a href="https://instagram.com/yourprofile" target="_blank">Instagram</a>
            <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
        </div>
    </footer>
</body>
</html>
